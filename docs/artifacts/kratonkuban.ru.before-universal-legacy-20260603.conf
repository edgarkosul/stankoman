server {
    server_name kratonkuban.ru www.kratonkuban.ru;

    root /var/www/kratonkuban.ru;
    index index.php index.html index.htm;

    access_log /var/log/nginx/kratonkuban.ru.access.log;
    error_log  /var/log/nginx/kratonkuban.ru.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kratonkuban.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kratonkuban.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.kratonkuban.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = kratonkuban.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name kratonkuban.ru www.kratonkuban.ru;
    return 404; # managed by Certbot




}
