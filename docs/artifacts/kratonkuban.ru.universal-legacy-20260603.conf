server {
    server_name kratonkuban.ru www.kratonkuban.ru;

    root /var/www/kratonkuban.ru;
    index index.php index.html index.htm;

    access_log /var/log/nginx/kratonkuban.ru.access.log;
    error_log  /var/log/nginx/kratonkuban.ru.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Temporary legacy product redirect resolver for top-level static PHP pages.
    # Matched legacy products receive a Laravel redirect; resolver 404 falls back to the old PHP file.
    location ~ ^/[^/]+\.php$ {
        proxy_intercept_errors on;
        error_page 404 = @legacy_php_fallback;

        proxy_set_header Host intertooler.ru;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_ssl_name intertooler.ru;

        proxy_pass https://127.0.0.1/_legacy/kraton/resolve?path=$uri;
    }

    location @legacy_php_fallback {
        internal;
        root /var/www/kratonkuban.ru;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/kratonkuban.ru$uri;
        fastcgi_param SCRIPT_NAME $uri;
        fastcgi_param DOCUMENT_ROOT /var/www/kratonkuban.ru;
        fastcgi_param DOCUMENT_URI $uri;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kratonkuban.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kratonkuban.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.kratonkuban.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = kratonkuban.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name kratonkuban.ru www.kratonkuban.ru;
    return 404; # managed by Certbot




}
